AWSTemplateFormatVersion: "2010-09-09"
Description: EKS worker nodes
Parameters:
  VpcId:
    Type: String
    Default: vpc-0f4bf5515382b1ea6
  WorkerNodeSubnetA:
    Type: String
    Description: Subnets for worker nodes
    Default: subnet-0d78c115d3ed3f973
  WorkerNodeSubnetB:
    Type: String
    Description: Subnets for worker nodes
    Default: subnet-0e11cdd46ff1175b8
  WorkerNodeSubnetC:
    Type: String
    Description: Subnets for worker nodes
    Default: subnet-0cd0103b186bfcf71
  WorkerNodeSubnetD:
    Type: String
    Description: Subnets for worker nodes
    Default: subnet-048988bc91b957f14
  ClusterName:
    Type: String
    Description: The cluster name provided when the cluster was created. If it is incorrect, nodes will not be able to join the cluster.
    Default: eksworkshop-eksctl
  ControlPlaneSecurityGroup:
    Type: String
    Description: The security group of the cluster control plane.
    Default: sg-04ad1f03c6b526969
  NodeGroupName:
    Type: String
    Default: nodegroup
  NodeGroupRoleName:
    Type: String
    Default: NodeGroupRole
  NodeInstanceType:
    Type: String
    Default: m5.large
    AllowedValues:
      - c5.large
      - m5.large
    ConstraintDescription: Must be a valid EC2 instance type
    Description: EC2 instance type for the node instances
Resources:
  LaunchTemplate:
    Type: "AWS::EC2::LaunchTemplate"
    Properties:
      LaunchTemplateName: !Sub 'eksctl-${ClusterName}-nodegroup-nodegroup'
      LaunchTemplateData:
        IamInstanceProfile: 
          Arn: !GetAtt 'NodeInstanceProfile.Arn'
        BlockDeviceMappings: 
        - DeviceName: /dev/xvda
          Ebs:
            Iops: 3000
            Throughput: 125
            VolumeType: gp3
            VolumeSize: 30
            Encrypted: true
        MetadataOptions:
          HttpPutResponseHopLimit: 2
          HttpTokens: optional
        SecurityGroupIds:
          - !Ref ControlPlaneSecurityGroup
        TagSpecifications:
          - ResourceType: instance
            Tags:
              - Key: Name
                Value: !Sub '${ClusterName}-nodegroup-Node'
              - Key: 'alpha.eksctl.io/nodegroup-name'
                Value: nodegroup
              - Key: 'alpha.eksctl.io/nodegroup-type'
                Value: managed
              - Key: 'eks:cluster-name'
                Value: !Ref ClusterName
              - Key: !Sub 'kubernetes.io/cluster/${ClusterName}'
                Value: owned
              - Key: !Sub 'k8s.io/cluster-autoscaler/${ClusterName}'
                Value: owned
              # 'aws:' is reserved by system
              # - Key: 'aws:eks:cluster-name'
              #   Value: !Ref ClusterName
          - ResourceType: volume
            Tags: 
              - Key: Name
                Value: !Sub '${ClusterName}-nodegroup-Node'
              - Key: 'eks:cluster-name'
                Value: !Ref ClusterName
              - Key: 'alpha.eksctl.io/nodegroup-name'
                Value: nodegroup
              - Key: 'alpha.eksctl.io/nodegroup-name'
                Value: managed
              - Key: 'eks:nodegroup-name'
                Value: !Ref NodeGroupName
          - ResourceType: network-interface
            Tags:
              - Key: Name
                Value: !Sub '${ClusterName}-nodegroup-Node'
              - Key: 'eks:cluster-name'
                Value: !Ref ClusterName
              - Key: 'alpha.eksctl.io/nodegroup-name'
                Value: nodegroup
              - Key: 'alpha.eksctl.io/nodegroup-type'
                Value: managed
              - Key: 'eks:nodegroup-name'
                Value: !Ref NodeGroupName
  ManagedNodeGroup:
    Type: "AWS::EKS::Nodegroup"
    Properties:
      AmiType: AL2_x86_64
      ClusterName: !Ref ClusterName
      InstanceTypes:
        - m5.large
      Labels:
        "alpha.eksctl.io/cluster-name": !Ref ClusterName
        "alpha.eksctl.io/nodegroup-name": !Ref NodeGroupName
      LaunchTemplate:
        Id: !Ref LaunchTemplate
      NodeRole: !GetAtt 'NodeInstanceRole.Arn'
      NodegroupName: !Ref NodeGroupName
      ScalingConfig:
        DesiredSize: 4
        MaxSize: 8
        MinSize: 2
      Subnets:
        - !Ref WorkerNodeSubnetA
        - !Ref WorkerNodeSubnetB
        - !Ref WorkerNodeSubnetC
        - !Ref WorkerNodeSubnetD
      Tags: !Sub |
        "{
          'alpha.eksctl.io/cluster-name': '${ClusterName}',
          'alpha.eksctl.io/nodegroup-name':'${NodeGroupName}',
          'alpha.eksctl.io/nodegroup-type': 'managed',
          'eksctl.cluster.k8s.io/v1alpha1/cluster-name':'${ClusterName}',
          'eks:cluster-name':'${ClusterName}'
        }"
        # - Key: 'alpha.eksctl.io/cluster-name'
        #   Value: !Ref ClusterName
        # - Key: 'alpha.eksctl.io/nodegroup-name'
        #   Value: !Ref NodeGroupName
        # - Key: 'alpha.eksctl.io/nodegroup-type'
        #   Value: managed
        # - Key: 'eksctl.cluster.k8s.io/v1alpha1/cluster-name'
        #   Value: !Ref ClusterName
        # - Key: 'eks:cluster-name'
        #   Value: !Ref ClusterName
  NodeInstanceRole:
    Type: "AWS::IAM::Role"
    Properties:
      RoleName: !Sub '${AWS::StackName}-${NodeGroupRoleName}'
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ec2.amazonaws.com
            Action:
              - "sts:AssumeRole"
      ManagedPolicyArns:
        - "arn:aws:iam::aws:policy/AmazonEC2ContainerRegistryPowerUser"
        - "arn:aws:iam::aws:policy/AmazonEC2ContainerRegistryReadOnly"
        - "arn:aws:iam::aws:policy/AmazonEKSWorkerNodePolicy"
        - "arn:aws:iam::aws:policy/AmazonEKS_CNI_Policy"        
        - "arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore"
        - "arn:aws:iam::aws:policy/CloudWatchAgentServerPolicy"
      Path: /
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}/NodeInstanceRole'
        - Key: 'alpha.eksctl.io/cluster-name'
          Value: !Ref ClusterName
        - Key: 'alpha.eksctl.io/nodegroup-name'
          Value: !Ref NodeGroupName
        - Key: 'alpha.eksctl.io/nodegroup-type'
          Value: managed
        - Key: 'eks:cluster-name'
          Value: !Ref ClusterName
        - Key: 'eksctl.cluster.k8s.io/v1alpha1/cluster-name'
          Value: !Ref ClusterName
  NodeInstanceProfile:
    Type: "AWS::IAM::InstanceProfile"
    Properties:
      Path: /
      Roles:
        - Ref: NodeInstanceRole

  #NodeKeyPair:
  #  Type: AWS::EC2::KeyPair
  #  Properties: 
  #    KeyName: NodeKeyPair
  #    Tags: 
  #      - Key: Name
  #        Value: !Sub ${ClusterName} nodegroup key pair
  
  NodeSecurityGroup:
    Type: "AWS::EC2::SecurityGroup"
    Properties:
      GroupDescription: Communication between all nodes in the cluster
      Tags:
        - Key: !Sub kubernetes.io/cluster/${ClusterName}
          Value: owned
      VpcId: !Ref VpcId
  NodeSecurityGroupIngress:
    Type: "AWS::EC2::SecurityGroupIngress"
    DependsOn: NodeSecurityGroup
    Properties:
      Description: Allow node to communicate with each other
      FromPort: 0
      GroupId: !Ref NodeSecurityGroup
      SourceSecurityGroupId: !Ref NodeSecurityGroup
      IpProtocol: "-1"
      ToPort: 65535
  # Control Plane Security Group Setting
  ControlPlaneSecurityGroupIngress:
    Type: "AWS::EC2::SecurityGroupIngress"
    DependsOn: NodeSecurityGroup
    Properties:
      Description: Allow pods to communicate with the cluster API Server
      FromPort: 443
      GroupId: !Ref ControlPlaneSecurityGroup
      IpProtocol: tcp
      SourceSecurityGroupId: !Ref NodeSecurityGroup
      ToPort: 443
  ControlPlaneEgressToNodeSecurityGroup:
    Type: "AWS::EC2::SecurityGroupEgress"
    DependsOn: NodeSecurityGroup
    Properties:
      Description: Allow the cluster control plane to communicate with worker Kubelet and pods
      DestinationSecurityGroupId: !Ref NodeSecurityGroup
      FromPort: 1025
      GroupId: !Ref ControlPlaneSecurityGroup
      IpProtocol: tcp
      ToPort: 65535
  ControlPlaneEgressToNodeSecurityGroupOn443:
    Type: "AWS::EC2::SecurityGroupEgress"
    DependsOn: NodeSecurityGroup
    Properties:
      Description: Allow the cluster control plane to communicate with pods running extension API servers on port 443
      DestinationSecurityGroupId: !Ref NodeSecurityGroup
      FromPort: 443
      GroupId: !Ref ControlPlaneSecurityGroup
      IpProtocol: tcp
      ToPort: 443
  # Node Security Group
  NodeSecurityGroupFromControlPlaneIngress:
    Type: "AWS::EC2::SecurityGroupIngress"
    DependsOn: NodeSecurityGroup
    Properties:
      Description: Allow worker Kubelets and pods to receive communication from the cluster control plane
      FromPort: 1025
      GroupId: !Ref NodeSecurityGroup
      IpProtocol: tcp
      SourceSecurityGroupId: !Ref ControlPlaneSecurityGroup
      ToPort: 65535
  NodeSecurityGroupFromControlPlaneOn443Ingress:
    Type: "AWS::EC2::SecurityGroupIngress"
    DependsOn: NodeSecurityGroup
    Properties:
      Description: Allow pods running extension API servers on port 443 to receive communication from cluster control plane
      FromPort: 443
      GroupId: !Ref NodeSecurityGroup
      IpProtocol: tcp
      SourceSecurityGroupId: !Ref ControlPlaneSecurityGroup
      ToPort: 443
  # Node Group
  # NodeLaunchConfig:
  #   Type: "AWS::AutoScaling::LaunchConfiguration"
  #   Properties:
  #     AssociatePublicIpAddress: false
  #     BlockDeviceMappings:
  #       - DeviceName: /dev/xvda
  #         Ebs:
  #           DeleteOnTermination: true
  #           VolumeSize: 30
  #           VolumeType: gp2
  #     IamInstanceProfile: !Ref NodeInstanceProfile
  #     ImageId: ami-01711d925a1e4cc3a
  #     InstanceType: m5.large
  #     KeyName: !Ref NodeKeyPair
  #     SecurityGroups:
  #       - Ref: NodeSecurityGroup
  #     UserData: !Base64
  #       "Fn::Sub": |
  #         #!/bin/bash
  #         set -o xtrace
  #         /etc/eks/bootstrap.sh ${ClusterName}
  #         /opt/aws/bin/cfn-signal --exit-code $? \
  #                  --stack  ${AWS::StackName} \
  #                  --resource NodeGroup  \
  #                  --region ${AWS::Region}
  NodesAutoScalingGroup:
    Type: 'AWS::AutoScaling::AutoScalingGroup'
    Properties:
      AutoScalingGroupName: !Sub '${ClusterName}-eks-nodegroup-asg'
      DesiredCapacity: 4
      MinSize: 2
      MaxSize: 4
      LaunchTemplate:
        LaunchTemplateId: !Ref LaunchTemplate
        Version: !GetAtt 'LaunchTemplate.LatestVersionNumber'
      VPCZoneIdentifier:
        - !Ref WorkerNodeSubnetA
        - !Ref WorkerNodeSubnetB
        - !Ref WorkerNodeSubnetC
        - !Ref WorkerNodeSubnetD
      Tags:
        - Key: 'eks:cluster-name'
          Value: !Ref ClusterName
          PropagateAtLaunch: true
        - Key: 'eks:nodegroup-name'
          Value: !Ref NodeGroupName
          # https://docs.aws.amazon.com/AWSCloudFormation/latest/UserGuide/aws-properties-as-tags.html#cfn-as-tags-PropagateAtLaunch
          PropagateAtLaunch: true
        # Without this tag, worker nodes are unable to join the cluster:
        - Key: !Sub 'kubernetes.io/cluster/${ClusterName}'
          Value: owned
          PropagateAtLaunch: true
        - Key: !Sub 'k8s.io/cluster-autoscaler/${ClusterName}'
          Value: owned
          PropagateAtLaunch: true
        - Key: 'k8s.io/cluster-autoscaler/enabled'
          Value: true
          PropagateAtLaunch: true
# Outputs:
#   NodeInstanceRole:
#     Description: The node instance role
#     Value: !GetAtt NodeInstanceRole.Arn
#   NodeSecurityGroup:
#     Description: The security group for the node group
#     Value: !Ref NodeSecurityGroup
#   NodeKeyPair:
#     Value: !Ref NodeKeyPair
